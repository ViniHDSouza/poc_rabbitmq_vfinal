services:
  estudo-rabbitmq:
    image: rabbitmq:3-management
    restart: no
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - estudo-rabbitmq:/var/lib/rabbitmq/

  estudo-rabbitmq-postgres:
    image: postgres:16
    restart: no
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: idempotent_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - estudo-rabbitmq-postgres:/var/lib/postgresql/data

volumes:
  estudo-rabbitmq:
  estudo-rabbitmq-postgres:
