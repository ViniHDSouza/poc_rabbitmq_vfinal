services:
  estudo-rabbitmq:
    image: rabbitmq:3-management
    restart: no
    ports:
      - "5672:5672"     # AMQP — protocolo binário nativo
      - "15672:15672"   # HTTP API + Management UI (mesmo plugin, mesma porta)
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
    volumes:
      - estudo-rabbitmq:/var/lib/rabbitmq/

volumes:
  estudo-rabbitmq:
